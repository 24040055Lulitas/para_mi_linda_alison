<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lana Del Rey — Para Alison 🌹</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #060409; }
    * { -webkit-tap-highlight-color: transparent; }

    /* ── iframe que ocupa toda la pantalla menos el player ── */
    #page-frame {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: 80px;
      width: 100%;
      height: calc(100vh - 80px);
      border: none;
      background: #060409;
      overflow: hidden;
      display: block;
    }

    /* ── Player global fijo al fondo ── */
    #global-player {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: rgba(6, 4, 9, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: grid;
      grid-template-columns: 220px 1fr 180px;
      align-items: center;
      gap: 1rem;
      padding: 0 1.5rem;
      z-index: 9999;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .gp-info { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
    .gp-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
    .gp-text { min-width: 0; }
    .gp-title { font-family: 'Playfair Display', serif; font-size: 0.875rem; color: #f0e8e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .gp-album { font-family: 'Cormorant Garamond', serif; font-size: 0.7rem; color: rgba(240,232,224,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-top: 2px; }

    .gp-controls { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .gp-buttons { display: flex; align-items: center; gap: 1rem; }
    .gp-btn { background: none; border: none; color: rgba(240,232,224,0.5); font-size: 1rem; cursor: pointer; padding: 6px 8px; border-radius: 8px; line-height: 1; transition: color 0.2s, background 0.2s; min-width: 36px; min-height: 36px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; -webkit-user-select: none; user-select: none; }
    .gp-btn:hover  { color: #f0e8e0; background: rgba(255,255,255,0.07); }
    .gp-btn:active { transform: scale(0.92); }

    #gp-play { width: 42px; height: 42px; border-radius: 50%; background: var(--accent, #c9a96e); color: #000; font-size: 1.1rem; }
    #gp-play:hover { background: #fff; }

    .gp-progress { display: flex; align-items: center; gap: 0.5rem; width: 100%; max-width: 600px; }
    .gp-time { font-family: 'Cormorant Garamond', serif; font-size: 0.7rem; color: rgba(240,232,224,0.4); white-space: nowrap; min-width: 32px; }
    .gp-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 999px; position: relative; cursor: pointer; touch-action: none; }
    .gp-bar-fill { position: absolute; top: 0; left: 0; bottom: 0; background: var(--accent, #c9a96e); border-radius: 999px; pointer-events: none; transition: width 0.15s linear; }

    .gp-right { display: flex; align-items: center; justify-content: flex-end; gap: 0.25rem; }
    .gp-btn--queue { position: relative; }
    .queue-badge { position: absolute; top: 0; right: 0; background: var(--accent, #c9a96e); color: #000; font-size: 0.5rem; font-weight: bold; min-width: 13px; height: 13px; border-radius: 99px; display: none; align-items: center; justify-content: center; pointer-events: none; line-height: 1; padding: 0 2px; }
    .gp-btn.active { color: var(--accent, #c9a96e); }

    #queue-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    #queue-overlay.open { opacity: 1; pointer-events: all; }

    #queue-panel { position: fixed; top: 0; right: 0; bottom: 0; width: min(380px, 92vw); background: #0e0a18; border-left: 1px solid rgba(255,255,255,0.08); z-index: 10001; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); box-shadow: -8px 0 40px rgba(0,0,0,0.6); }
    #queue-panel.open { transform: translateX(0); }

    .qp-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .qp-header-left { display: flex; align-items: baseline; gap: 0.5rem; }
    .qp-title { font-family: 'Cinzel Decorative', serif; font-size: 0.9rem; color: var(--accent, #c9a96e); letter-spacing: 0.1em; }
    .qp-count { font-family: 'Cormorant Garamond', serif; font-size: 0.75rem; color: rgba(240,232,224,0.35); }
    .qp-close { background: none; border: none; color: rgba(240,232,224,0.4); font-size: 1.3rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; touch-action: manipulation; }
    .qp-close:hover { color: #f0e8e0; background: rgba(255,255,255,0.07); }

    .qp-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0.5rem 0; }
    .qp-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 0.75rem; color: rgba(240,232,224,0.25); font-family: 'Cormorant Garamond', serif; font-style: italic; text-align: center; padding: 2rem; }
    .qp-empty-icon { font-size: 2.5rem; opacity: 0.3; }

    .qp-item { display: grid; grid-template-columns: 38px 1fr auto; align-items: center; gap: 0.75rem; padding: 0.6rem 1.5rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; touch-action: manipulation; }
    .qp-item:hover { background: rgba(255,255,255,0.04); }
    .qp-item-thumb { width: 38px; height: 38px; border-radius: 4px; object-fit: cover; border: 1px solid rgba(255,255,255,0.08); }
    .qp-item-info { min-width: 0; }
    .qp-item-title { font-family: 'Playfair Display', serif; font-size: 0.825rem; color: #f0e8e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .qp-item-album { font-family: 'Cormorant Garamond', serif; font-size: 0.68rem; color: rgba(240,232,224,0.38); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-top: 2px; }
    .qp-item-remove { background: none; border: none; color: rgba(240,232,224,0.22); font-size: 1rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.2s; flex-shrink: 0; touch-action: manipulation; }
    .qp-item-remove:hover { color: #e8a0a0; }

    .qp-footer { padding: 0.875rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.07); }
    .qp-clear { width: 100%; padding: 0.55rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: rgba(240,232,224,0.55); border-radius: 999px; font-family: 'Cormorant Garamond', serif; font-size: 0.8rem; letter-spacing: 0.1em; cursor: pointer; transition: background 0.2s, color 0.2s; touch-action: manipulation; }
    .qp-clear:hover { background: rgba(255,255,255,0.1); color: #f0e8e0; }

    #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(8px); background: rgba(20,15,30,0.96); border: 1px solid rgba(255,255,255,0.1); color: #f0e8e0; font-family: 'Cormorant Garamond', serif; font-size: 0.875rem; padding: 0.55rem 1.25rem; border-radius: 999px; backdrop-filter: blur(12px); opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; z-index: 99999; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      #page-frame  { bottom: 68px; height: calc(100vh - 68px); }
      #global-player { height: 68px; grid-template-columns: 1fr auto; grid-template-rows: auto auto; padding: 0.4rem 0.75rem; gap: 0.3rem; }
      .gp-info  { grid-column: 1; grid-row: 1; }
      .gp-right { grid-column: 2; grid-row: 1; }
      .gp-controls { grid-column: 1 / -1; grid-row: 2; gap: 4px; }
      .gp-buttons { gap: 0.6rem; }
      #gp-play  { width: 36px; height: 36px; font-size: 1rem; }
      .gp-btn   { min-width: 30px; min-height: 30px; font-size: 0.9rem; padding: 4px 6px; }
      .gp-time  { font-size: 0.65rem; min-width: 28px; }
      .gp-thumb { width: 40px; height: 40px; }
      .gp-title { font-size: 0.8rem; }
      #gp-vol-wrap { display: none; }
    }

    @media (max-width: 480px) {
      .gp-right { gap: 0; }
      #gp-shuffle, #gp-loop { display: none; }
    }
  </style>
</head>
<body>

  <!-- ══ IFRAME: toda la navegación ocurre aquí ══ -->
  <iframe id="page-frame" src="index-content.html" title="Contenido" allow="autoplay" allowfullscreen scrolling="yes"></iframe>

  <!-- ══ PLAYER GLOBAL (nunca se destruye) ══ -->
  <div id="global-player">
    <div class="gp-info">
      <img id="gp-thumb" class="gp-thumb" src="assets/images/albums/born-to-die.jpg" alt="Portada" onerror="this.style.display='none'" />
      <div class="gp-text">
        <span id="gp-title" class="gp-title">— Elige una canción —</span>
        <span id="gp-album" class="gp-album">Para Alison 🌹</span>
      </div>
    </div>

    <div class="gp-controls">
      <div class="gp-buttons">
        <button class="gp-btn" id="gp-shuffle" title="Aleatorio">⇄</button>
        <button class="gp-btn" id="gp-prev"    title="Anterior">⏮</button>
        <button class="gp-btn" id="gp-play"    title="Play">▶</button>
        <button class="gp-btn" id="gp-next"    title="Siguiente">⏭</button>
        <button class="gp-btn" id="gp-loop"    title="Repetir">↺</button>
      </div>
      <div class="gp-progress">
        <span class="gp-time" id="gp-cur">0:00</span>
        <div class="gp-bar" id="gp-bar"><div class="gp-bar-fill" id="gp-fill" style="width:0%"></div></div>
        <span class="gp-time" id="gp-dur">0:00</span>
      </div>
    </div>

    <div class="gp-right">
      <div id="gp-vol-wrap" style="display:flex;align-items:center;gap:4px;">
        <span class="gp-btn" id="gp-vol-icon" style="cursor:pointer;font-size:0.9rem;">🔊</span>
        <input type="range" id="gp-vol" min="0" max="1" step="0.01" value="0.8" style="width:70px;accent-color:var(--accent,#c9a96e);cursor:pointer;" />
      </div>
      <button class="gp-btn gp-btn--queue" id="gp-queue-btn" title="Cola">🎶<span class="queue-badge" id="queue-badge"></span></button>
    </div>
  </div>

  <!-- ══ PANEL DE COLA ══ -->
  <div id="queue-overlay"></div>
  <div id="queue-panel">
    <div class="qp-header">
      <div class="qp-header-left">
        <span class="qp-title">Cola</span>
        <span class="qp-count" id="qp-count">0 canciones</span>
      </div>
      <button class="qp-close" id="qp-close">✕</button>
    </div>
    <div class="qp-body" id="qp-body"></div>
    <div class="qp-footer">
      <button class="qp-clear" id="qp-clear">Vaciar cola</button>
    </div>
  </div>

  <!-- ══ TOAST ══ -->
  <div id="toast"></div>

  <!-- ══ AUDIO GLOBAL (nunca se destruye) ══ -->
  <audio id="global-audio" playsinline webkit-playsinline x-webkit-airplay="allow" preload="auto"></audio>

  <script>
  (function () {
    "use strict";

    var K_QUEUE = "ldr_queue";
    var K_FAV   = "ldr_favorites";

    var state = { src: "", title: "", album: "", cover: "", slug: "", playlist: [], idx: 0, shuffle: false, loop: false, playing: false };

    var audio    = document.getElementById("global-audio");
    var frame    = document.getElementById("page-frame");
    var elThumb  = document.getElementById("gp-thumb");
    var elTitle  = document.getElementById("gp-title");
    var elAlbum  = document.getElementById("gp-album");
    var elPlay   = document.getElementById("gp-play");
    var elPrev   = document.getElementById("gp-prev");
    var elNext   = document.getElementById("gp-next");
    var elShuffle= document.getElementById("gp-shuffle");
    var elLoop   = document.getElementById("gp-loop");
    var elBar    = document.getElementById("gp-bar");
    var elFill   = document.getElementById("gp-fill");
    var elCur    = document.getElementById("gp-cur");
    var elDur    = document.getElementById("gp-dur");
    var elVol    = document.getElementById("gp-vol");
    var elVolIcon= document.getElementById("gp-vol-icon");
    var elQueueBtn = document.getElementById("gp-queue-btn");
    var elBadge  = document.getElementById("queue-badge");

    var qOverlay = document.getElementById("queue-overlay");
    var qPanel   = document.getElementById("queue-panel");
    var qBody    = document.getElementById("qp-body");
    var qCount   = document.getElementById("qp-count");
    var qClose   = document.getElementById("qp-close");
    var qClear   = document.getElementById("qp-clear");

    var toastEl  = document.getElementById("toast");
    var toastTimer = null;

    function fmt(s) { if (!s || isNaN(s)) return "0:00"; var m = Math.floor(s / 60); var ss = Math.floor(s % 60).toString().padStart(2, "0"); return m + ":" + ss; }
    function esc(s) { return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function loadQueue() { try { return JSON.parse(localStorage.getItem(K_QUEUE)) || []; } catch (_) { return []; } }
    function saveQueue(q) { try { localStorage.setItem(K_QUEUE, JSON.stringify(q)); } catch (_) {} }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 2000);
    }

    function onTap(el, fn) {
      if (!el) return;
      var touched = false;
      el.addEventListener("touchend", function (e) { e.preventDefault(); touched = true; fn(); setTimeout(function () { touched = false; }, 400); }, { passive: false });
      el.addEventListener("click", function () { if (!touched) fn(); });
    }

    var ACCENTS = { "born-to-die": "#9b59b6", "paradise": "#27ae60", "ultraviolence": "#c0a060", "honeymoon": "#e8b4b8", "lust-for-life": "#4fc3f7", "norman-rockwell":"#a8d8ea", "blue-banisters": "#5b8fd4", "did-you-know": "#d4a843" };
    function setAccent(slug) { var color = ACCENTS[slug] || "#c9a96e"; document.documentElement.style.setProperty("--accent", color); }

    function normalizeUrl(url) { if (!url) return ""; try { return new URL(url).href; } catch(_) { try { return new URL(url, window.location.href).href; } catch(__) { return url; } } }

    function loadTrack(src, title, album, cover, slug, playlist, idx, autoPlay) {
      var normSrc   = normalizeUrl(src);
      var normCover = normalizeUrl(cover);
      state.src      = normSrc;
      state.title    = title;
      state.album    = album;
      state.cover    = normCover;
      state.slug     = slug || "";
      state.playlist = (playlist || []).map(function(t) { return { src: normalizeUrl(t.src), title: t.title }; });
      state.idx      = (idx !== undefined) ? idx : 0;
      elTitle.textContent = title || "— Elige una canción —";
      elAlbum.textContent = album || "Para Alison 🌹";
      if (normCover) { elThumb.src = normCover; elThumb.style.display = ""; }
      setAccent(slug);
      audio.src = normSrc;
      audio.load();
      if (autoPlay) { audio.play().then(function () { setPlaying(true); }).catch(function () { setPlaying(false); }); } else { setPlaying(false); }
      updateMediaSession();
      postToFrame({ type: "TRACK_ACTIVE", src: src });
    }

    function setPlaying(val) {
      state.playing = val;
      elPlay.textContent = val ? "⏸" : "▶";
      elPlay.title = val ? "Pausar" : "Reproducir";
      if ("mediaSession" in navigator) { navigator.mediaSession.playbackState = val ? "playing" : "paused"; }
    }

    function doPlay() { if (!state.src) return; if (audio.paused) { audio.play().then(function () { setPlaying(true); }).catch(function () {}); } else { audio.pause(); setPlaying(false); } }
    function doNext() {
      var q = loadQueue();
      if (q.length > 0) { var item = q.shift(); saveQueue(q); updateQueueBadge(); renderQueuePanel(); loadTrack(item.src, item.title, item.album, item.cover, item.slug, [], 0, true); return; }
      if (state.playlist.length === 0) return;
      var next; if (state.shuffle) { do { next = Math.floor(Math.random() * state.playlist.length); } while (next === state.idx && state.playlist.length > 1); } else { next = (state.idx + 1) % state.playlist.length; }
      var t = state.playlist[next];
      loadTrack(t.src, t.title, state.album, state.cover, state.slug, state.playlist, next, true);
    }
    function doPrev() { if (audio.currentTime > 3) { audio.currentTime = 0; return; } if (state.playlist.length === 0) return; var prev = (state.idx - 1 + state.playlist.length) % state.playlist.length; var t = state.playlist[prev]; loadTrack(t.src, t.title, state.album, state.cover, state.slug, state.playlist, prev, true); }
    function doShuffle() { state.shuffle = !state.shuffle; elShuffle.classList.toggle("active", state.shuffle); }
    function doLoop() { state.loop = !state.loop; elLoop.classList.toggle("active", state.loop); }

    audio.addEventListener("timeupdate", function () { if (!audio.duration) return; var pct = (audio.currentTime / audio.duration) * 100; elFill.style.width = pct + "%"; elCur.textContent = fmt(audio.currentTime); });
    audio.addEventListener("loadedmetadata", function () { elDur.textContent = fmt(audio.duration); });
    audio.addEventListener("ended", function () { if (state.loop) { audio.currentTime = 0; audio.play().catch(function () {}); } else { doNext(); } });
    audio.addEventListener("pause", function () { if (!audio.ended) setPlaying(false); });
    audio.addEventListener("play",  function () { setPlaying(true); });

    var dragging = false;
    function seekAt(clientX) { if (!audio.duration) return; var rect = elBar.getBoundingClientRect(); var ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width)); audio.currentTime = ratio * audio.duration; elFill.style.width = (ratio * 100) + "%"; }
    elBar.addEventListener("mousedown",  function (e) { dragging = true; seekAt(e.clientX); });
    document.addEventListener("mousemove", function (e) { if (dragging) seekAt(e.clientX); });
    document.addEventListener("mouseup",   function ()  { dragging = false; });
    elBar.addEventListener("touchstart", function (e) { e.preventDefault(); dragging = true; seekAt(e.touches[0].clientX); }, { passive: false });
    elBar.addEventListener("touchmove",  function (e) { e.preventDefault(); if (dragging) seekAt(e.touches[0].clientX); }, { passive: false });
    elBar.addEventListener("touchend",   function ()  { dragging = false; });

    audio.volume = 0.8;
    elVol.addEventListener("input", function () { audio.volume = parseFloat(elVol.value); elVolIcon.textContent = audio.volume === 0 ? "🔇" : audio.volume < 0.5 ? "🔉" : "🔊"; });
    onTap(elVolIcon, function () { audio.muted = !audio.muted; elVolIcon.textContent = audio.muted ? "🔇" : "🔊"; });

    onTap(elPlay,    doPlay);
    onTap(elNext,    doNext);
    onTap(elPrev,    doPrev);
    onTap(elShuffle, doShuffle);
    onTap(elLoop,    doLoop);
    onTap(elQueueBtn, function () { openQueue(); });

    function updateMediaSession() {
      if (!("mediaSession" in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({ title: state.title || "Lana Del Rey", artist: "Lana Del Rey", album: state.album || "", artwork: state.cover ? [{ src: state.cover, sizes: "512x512", type: "image/jpeg" }] : [] });
      navigator.mediaSession.setActionHandler("play",           function () { audio.play().catch(function(){}); });
      navigator.mediaSession.setActionHandler("pause",          function () { audio.pause(); });
      navigator.mediaSession.setActionHandler("nexttrack",      doNext);
      navigator.mediaSession.setActionHandler("previoustrack",  doPrev);
    }

    function openQueue()  { qOverlay.classList.add("open"); qPanel.classList.add("open"); renderQueuePanel(); }
    function closeQueue() { qOverlay.classList.remove("open"); qPanel.classList.remove("open"); }

    qOverlay.addEventListener("click", closeQueue);
    onTap(qClose, closeQueue);
    onTap(qClear, function () { saveQueue([]); updateQueueBadge(); renderQueuePanel(); showToast("Cola vaciada"); });

    function updateQueueBadge() {
      var q = loadQueue();
      if (q.length > 0) { elBadge.textContent = q.length > 99 ? "99+" : q.length; elBadge.style.display = "flex"; elQueueBtn.classList.add("active"); }
      else { elBadge.style.display = "none"; elQueueBtn.classList.remove("active"); }
    }

    function renderQueuePanel() {
      var q = loadQueue();
      qCount.textContent = q.length + (q.length === 1 ? " canción" : " canciones");
      if (q.length === 0) { qBody.innerHTML = '<div class="qp-empty"><span class="qp-empty-icon">🎵</span><span>La cola está vacía.<br>Agrega canciones con <strong>+Cola</strong>.</span></div>'; return; }
      qBody.innerHTML = "";
      q.forEach(function (item, i) {
        var div = document.createElement("div");
        div.className = "qp-item";
        div.innerHTML = '<img class="qp-item-thumb" src="' + esc(item.cover || "") + '" alt="" onerror="this.style.display=\'none\'" /><div class="qp-item-info"><span class="qp-item-title">' + esc(item.title) + '</span><span class="qp-item-album">' + esc(item.album) + '</span></div><button class="qp-item-remove" type="button" data-idx="' + i + '">✕</button>';
        onTap(div.querySelector(".qp-item-info"), function () {
          var fresh = loadQueue();
          var it = fresh.splice(i, 1)[0];
          saveQueue(fresh);
          updateQueueBadge();
          renderQueuePanel();
          if (it) loadTrack(it.src, it.title, it.album, it.cover, it.slug, [], 0, true);
          closeQueue();
        });
        onTap(div.querySelector(".qp-item-remove"), function () {
          var fresh = loadQueue();
          fresh.splice(i, 1);
          saveQueue(fresh);
          updateQueueBadge();
          renderQueuePanel();
        });
        qBody.appendChild(div);
      });
    }

    function postToFrame(msg) { try { frame.contentWindow.postMessage(msg, "*"); } catch (_) {} }

    window.addEventListener("message", function (e) {
      var d = e.data;
      if (!d || !d.type) return;
      switch (d.type) {
        case "PLAY_TRACK":
          if (d.action === "toggle") { doPlay(); break; }
          if (d.action === "prev")   { doPrev(); break; }
          if (d.action === "next")   { doNext(); break; }
          if (d.action === "shuffle"){ doShuffle(); break; }
          if (d.action === "loop")   { doLoop(); break; }
          if (d.src) { loadTrack(d.src, d.title, d.album, d.cover, d.slug, d.playlist || [], d.idx || 0, true); }
          break;
        case "ADD_QUEUE":
          var q = loadQueue();
          if (q.length > 0 && q[q.length - 1].src === d.src) { showToast("Ya está en la cola ✓"); break; }
          q.push({ src: d.src, title: d.title, album: d.album, cover: d.cover, slug: d.slug, id: Date.now() });
          saveQueue(q);
          updateQueueBadge();
          renderQueuePanel();
          showToast("+ Cola: " + d.title);
          break;
        case "TOGGLE_FAV":
          var favs = []; try { favs = JSON.parse(localStorage.getItem(K_FAV)) || []; } catch(_){}
          var exists = favs.findIndex(function (f) { return f.src === d.src; });
          if (exists >= 0) { favs.splice(exists, 1); showToast("♡ Quitado de favoritas"); } else { favs.push({ src: d.src, title: d.title, album: d.album, cover: d.cover, slug: d.slug }); showToast("♥ Guardado en favoritas"); }
          try { localStorage.setItem(K_FAV, JSON.stringify(favs)); } catch(_){}
          postToFrame({ type: "FAV_UPDATE", src: d.src, isFav: exists < 0 });
          break;
        case "CHECK_FAV":
          var favs2 = []; try { favs2 = JSON.parse(localStorage.getItem(K_FAV)) || []; } catch(_){}
          var isFav = favs2.some(function (f) { return f.src === d.src; });
          postToFrame({ type: "FAV_STATE", src: d.src, isFav: isFav });
          break;
        case "GET_QUEUE_COUNT": postToFrame({ type: "QUEUE_COUNT", count: loadQueue().length }); break;
        case "OPEN_QUEUE": openQueue(); break;
        case "NAVIGATE":
          var navHref = d.href;
          if (navHref.startsWith("html/")) { navHref = navHref.replace("html/", ""); }
          frame.src = navHref;
          break;
      }
    });

    frame.addEventListener("load", function () {
      if (state.src) { setTimeout(function () { postToFrame({ type: "TRACK_ACTIVE", src: state.src }); postToFrame({ type: "QUEUE_COUNT", count: loadQueue().length }); }, 200); }
    });

    document.addEventListener("keydown", function (e) {
      var tag = e.target.tagName.toLowerCase();
      if (tag === "input" || tag === "textarea") return;
      switch (e.code) { case "Space": e.preventDefault(); doPlay(); break; case "ArrowRight": e.preventDefault(); doNext(); break; case "ArrowLeft": e.preventDefault(); doPrev(); break; }
    });

    window.addEventListener("storage", function (e) { if (e.key === K_QUEUE) { updateQueueBadge(); renderQueuePanel(); } });

    updateQueueBadge();
    renderQueuePanel();
  })();
  </script>
</body>
</html>
